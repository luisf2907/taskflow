# ═══════════════════════════════════════════════════════════════════════
# Taskflow self-hosted — perfil TEAM
# ═══════════════════════════════════════════════════════════════════════
# Stack pra equipes de 2-20 pessoas, ~700MB RAM total.
#
# Diferenca do perfil solo:
#   - AUTH_MODE=closed (admin cria users via CLI, sem signup aberto)
#   - Redis container pra rate limiting compartilhado
#   - Email SMTP configurado (convites + notificacoes por email)
#   - Users precisam trocar senha no primeiro login (flag must_change_password)
#
# Servicos:
#   postgres  — Postgres 17 com pgvector preinstalado (~100MB)
#   gotrue    — Auth (closed: sem signup, sem email) (~50MB)
#   postgrest — API REST sobre Postgres (~50MB)
#   nginx     — Gateway routing (/auth/v1 e /rest/v1) (~10MB)
#   bootstrap — One-shot: aplica bootstrap.sql e sai
#   redis     — Rate limiting compartilhado (~30MB)
#   app       — Next.js standalone (~200MB)
#
# Uso:
#   1. node scripts/setup-env.mjs team
#   2. Edite .env.local com SMTP e outros configs do time
#   3. docker compose -f docker/docker-compose.team.yml --env-file .env.local up -d
#   4. node --env-file=.env.local scripts/cli.mjs bootstrap \
#        --admin-email admin@team.local --admin-password changeme
#   5. Crie users: node --env-file=.env.local scripts/cli.mjs user:create \
#        --email user@team.local --password temp123 --name "Nome"
#   6. Abre http://localhost:3000 — user loga e troca senha no 1o acesso
# ═══════════════════════════════════════════════════════════════════════

name: taskflow-team

services:
  # ─────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: taskflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "5432"

  # ─────────────────────────────────────────────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.168.0
    container_name: taskflow-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL}/auth/v1
      GOTRUE_API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL}/auth/v1

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/taskflow?sslmode=disable&search_path=auth

      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_SITE_URL}/**,${NEXT_PUBLIC_SITE_URL}/auth/callback,${NEXT_PUBLIC_SITE_URL}/reset-password

      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_ISSUER: ${NEXT_PUBLIC_SUPABASE_URL}/auth/v1
      GOTRUE_JWT_AUD: authenticated

      # Auth mode: closed (default) = admin cria via CLI, sem signup.
      # Pra habilitar signup com verificacao de email:
      #   AUTH_MODE=standard, GOTRUE_DISABLE_SIGNUP=false, GOTRUE_MAILER_AUTOCONFIRM=false
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-true}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-admin@taskflow.local}

      # SMTP — pra password reset emails do GoTrue
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASSWORD:-}
      GOTRUE_SMTP_SENDER_NAME: Taskflow

      GOTRUE_RATE_LIMIT_EMAIL_SENT: 100
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
    expose:
      - "9999"

  # ─────────────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: taskflow-postgrest
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/taskflow
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_EXP: 3600
      PGRST_DB_MAX_ROWS: 1000
    expose:
      - "3000"

  # ─────────────────────────────────────────────────────────────────────
  bootstrap:
    image: postgres:17-alpine
    container_name: taskflow-bootstrap
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_started
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../supabase/self-hosted/bootstrap.sql:/bootstrap.sql:ro
      - ../supabase/self-hosted/realtime-triggers.sql:/realtime-triggers.sql:ro
      - ../supabase/migrations:/migrations:ro
      - ../scripts/bootstrap.sh:/bootstrap.sh:ro
    command: ["/bin/sh", "/bootstrap.sh"]

  # ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    depends_on:
      gotrue:
        condition: service_started
      postgrest:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:8000"

  # ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  # ─────────────────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_REALTIME_DRIVER: ${REALTIME_DRIVER:-pg-notify-sse}
        NEXT_PUBLIC_VCS_TOKEN_MODE: ${VCS_TOKEN_MODE:-pat}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-closed}
        NEXT_PUBLIC_OBS_DRIVER: ${OBS_DRIVER:-console}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    container_name: taskflow-app
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      nginx:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production

      # Supabase core
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SUPABASE_INTERNAL_URL: http://nginx:8000
      JWT_SECRET: ${JWT_SECRET}

      # Redis (rate limiting compartilhado)
      REDIS_URL: redis://redis:6379

      # Postgres direto (pg-listen pra SSE)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: taskflow

      # Drivers
      AUTH_MODE: ${AUTH_MODE:-closed}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local-disk}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/storage}
      REALTIME_DRIVER: ${REALTIME_DRIVER:-pg-notify-sse}
      NEXT_PUBLIC_REALTIME_DRIVER: ${REALTIME_DRIVER:-pg-notify-sse}
      LLM_DRIVER: ${LLM_DRIVER:-disabled}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      VOICE_DRIVER: ${VOICE_DRIVER:-disabled}
      VCS_DRIVER: ${VCS_DRIVER:-github}
      VCS_API_URL: ${VCS_API_URL:-}
      VCS_TOKEN_MODE: ${VCS_TOKEN_MODE:-pat}
      NEXT_PUBLIC_VCS_TOKEN_MODE: ${VCS_TOKEN_MODE:-pat}
      VCS_INSTANCE_PAT: ${VCS_INSTANCE_PAT:-}
      OBS_DRIVER: ${OBS_DRIVER:-console}
      NEXT_PUBLIC_OBS_DRIVER: ${OBS_DRIVER:-console}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3000:3000"
    volumes:
      - storage-data:/app/storage

volumes:
  postgres-data:
    name: taskflow-postgres-data
  storage-data:
    name: taskflow-storage-data
  redis-data:
    name: taskflow-redis-data
