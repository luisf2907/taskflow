# ═══════════════════════════════════════════════════════════════════════
# nginx — gateway do stack self-hosted solo
# ═══════════════════════════════════════════════════════════════════════
# Funcao: expor um unico endpoint NEXT_PUBLIC_SUPABASE_URL que roteia
# para os servicos internos (GoTrue e PostgREST). Substitui o Kong da
# stack oficial Supabase com uma config ~1KB, ~10MB de RAM.
#
# Storage e Realtime NAO passam por aqui no perfil solo:
#   - STORAGE_DRIVER=local-disk: uploads vao pro app em /api/storage/*
#   - REALTIME_DRIVER=pg-notify-sse: SSE vem do app em /api/realtime/*
#
# Endpoints expostos (mapeia 1:1 com Supabase Cloud):
#   /auth/v1/*  → gotrue:9999
#   /rest/v1/*  → postgrest:3000
# ═══════════════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Supabase SDK envia JSONs; Kong/PostgREST esperam content-type JSON por default
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs pra stdout/stderr (pegaveis via docker logs)
    access_log /dev/stdout;
    error_log /dev/stderr;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;  # batendo com file_size_limit dos buckets

    # CORS — GoTrue e PostgREST precisam de headers corretos
    map $http_origin $cors_origin {
        default $http_origin;  # echo; operador pode restringir via env
    }

    upstream gotrue {
        server gotrue:9999;
    }

    upstream postgrest {
        server postgrest:3000;
    }

    server {
        listen 8000;
        server_name _;

        # ───── GoTrue (/auth/v1/*) ─────
        location /auth/v1/ {
            # Remove /auth/v1/ prefix ao fazer proxy (GoTrue nao espera esse prefixo)
            rewrite ^/auth/v1/(.*)$ /$1 break;
            proxy_pass http://gotrue;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ───── PostgREST (/rest/v1/*) ─────
        location /rest/v1/ {
            rewrite ^/rest/v1/(.*)$ /$1 break;
            proxy_pass http://postgrest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # PostgREST le JWT do Authorization: Bearer
            proxy_set_header Authorization $http_authorization;
            proxy_pass_request_headers on;
        }

        # ───── Healthcheck gateway ─────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ───── 404 pra rotas nao mapeadas ─────
        location / {
            return 404;
        }
    }
}
