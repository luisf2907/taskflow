# ═══════════════════════════════════════════════════════════════════════
# nginx — gateway do stack self-hosted solo
# ═══════════════════════════════════════════════════════════════════════
# Funcao: expor um unico endpoint NEXT_PUBLIC_SUPABASE_URL que roteia
# para os servicos internos (GoTrue e PostgREST). Substitui o Kong da
# stack oficial Supabase com uma config ~1KB, ~10MB de RAM.
#
# Storage e Realtime NAO passam por aqui no perfil solo:
#   - STORAGE_DRIVER=local-disk: uploads vao pro app em /api/storage/*
#   - REALTIME_DRIVER=pg-notify-sse: SSE vem do app em /api/realtime/*
#
# CORS: como browser acessa app em http://localhost:3000 e API em
# http://localhost:8000 (origens diferentes), preflight OPTIONS precisa
# responder Access-Control-Allow-Origin. nginx lida com isso aqui em
# vez de depender de config CORS por cada servico backend.
# ═══════════════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    upstream gotrue {
        server gotrue:9999;
    }

    upstream postgrest {
        server postgrest:3000;
    }

    # ───── Configuracoes CORS reutilizaveis ─────
    # Echo do Origin do request (qualquer origem liberada). Operador que
    # quiser restringir pode substituir por valor fixo tipo
    # "http://localhost:3000".
    map $http_origin $cors_allow_origin {
        default $http_origin;
        ""      "*";
    }

    server {
        listen 8000;
        server_name _;

        # ───── Headers CORS aplicados em toda rota /auth e /rest ─────
        # Para economizar repeticao, definimos num set de includes virtuais
        # abaixo. nginx nao tem "include directive" dentro de location, entao
        # repetimos as add_header em cada bloco.

        # ───── GoTrue (/auth/v1/*) ─────
        location /auth/v1/ {
            # Preflight OPTIONS: responde direto com headers CORS, nao
            # passa pro backend (GoTrue nao lida com OPTIONS).
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_allow_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, accept-profile, apikey, x-client-info, x-supabase-api-version, prefer, content-profile, range, range-unit" always;
                add_header Access-Control-Max-Age           1728000 always;
                add_header Content-Length                   0;
                add_header Content-Type                     "text/plain; charset=utf-8";
                return 204;
            }

            # Esconde os CORS headers que o GoTrue ja adiciona internamente
            # (valor "*" em Access-Control-Allow-Origin) — evita duplicidade
            # que quebra o browser ("The header contains multiple values").
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Expose-Headers;

            # CORS em todas as responses reais
            add_header Access-Control-Allow-Origin      $cors_allow_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Expose-Headers    "Content-Encoding, Content-Length, Content-Range, Date, Server, X-Request-Id" always;

            rewrite ^/auth/v1/(.*)$ /$1 break;
            proxy_pass http://gotrue;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ───── PostgREST (/rest/v1/*) ─────
        location /rest/v1/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_allow_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, accept-profile, apikey, x-client-info, x-supabase-api-version, prefer, content-profile, range, range-unit" always;
                add_header Access-Control-Max-Age           1728000 always;
                add_header Content-Length                   0;
                add_header Content-Type                     "text/plain; charset=utf-8";
                return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Expose-Headers;

            add_header Access-Control-Allow-Origin      $cors_allow_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Expose-Headers    "Content-Encoding, Content-Location, Content-Range, Content-Type, Date, Location, Server, Transfer-Encoding, Range-Unit" always;

            rewrite ^/rest/v1/(.*)$ /$1 break;
            proxy_pass http://postgrest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # ───── Healthcheck gateway ─────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }
}
