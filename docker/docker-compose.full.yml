# ═══════════════════════════════════════════════════════════════════════
# Taskflow self-hosted — perfil FULL (paridade SaaS)
# ═══════════════════════════════════════════════════════════════════════
# Stack completo, ~4GB RAM total (sem voice-worker/Ollama).
#
# Diferenca do perfil team:
#   - MinIO (S3-compat storage em vez de local-disk)
#   - GlitchTip (error tracking Sentry-compat)
#   - Voice worker reference (GPU NVIDIA, opcional)
#
# Servicos:
#   postgres      — Postgres 17 com pgvector (~100MB)
#   gotrue        — Auth (~50MB)
#   postgrest     — API REST (~50MB)
#   nginx         — Gateway routing (~10MB)
#   bootstrap     — One-shot: aplica schema
#   redis         — Rate limiting + GlitchTip (~30MB)
#   minio         — S3-compat storage (~200MB)
#   glitchtip     — Error tracking Sentry-compat (~300MB)
#   glitchtip-worker — Background jobs do GlitchTip (~200MB)
#   app           — Next.js standalone (~200MB)
#
# Opcional (GPU NVIDIA necessaria):
#   voice-worker  — FastAPI + Whisper + pyannote (~4GB+ com modelos)
#
# Uso:
#   1. node scripts/setup-env.mjs full
#   2. Edite .env.local (SMTP, dominio, etc)
#   3. docker compose -f docker/docker-compose.full.yml --env-file .env.local up -d
#   4. node --env-file=.env.local scripts/cli.mjs bootstrap \
#        --admin-email admin@company.com --admin-password changeme
# ═══════════════════════════════════════════════════════════════════════

name: taskflow-full

services:
  # ─────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: taskflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "5432"

  # ─────────────────────────────────────────────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.168.0
    container_name: taskflow-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL}/auth/v1
      GOTRUE_API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL}/auth/v1
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/taskflow?sslmode=disable&search_path=auth
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_SITE_URL}/**,${NEXT_PUBLIC_SITE_URL}/auth/callback,${NEXT_PUBLIC_SITE_URL}/reset-password
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_ISSUER: ${NEXT_PUBLIC_SUPABASE_URL}/auth/v1
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-false}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-admin@taskflow.local}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASSWORD:-}
      GOTRUE_SMTP_SENDER_NAME: Taskflow
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 100
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
    expose:
      - "9999"

  # ─────────────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: taskflow-postgrest
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/taskflow
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_EXP: 3600
      PGRST_DB_MAX_ROWS: 1000
    expose:
      - "3000"

  # ─────────────────────────────────────────────────────────────────────
  bootstrap:
    image: postgres:17-alpine
    container_name: taskflow-bootstrap
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_started
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../supabase/self-hosted/bootstrap.sql:/bootstrap.sql:ro
      - ../supabase/self-hosted/realtime-triggers.sql:/realtime-triggers.sql:ro
      - ../supabase/migrations:/migrations:ro
      - ../scripts/bootstrap.sh:/bootstrap.sh:ro
    command: ["/bin/sh", "/bootstrap.sh"]

  # ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    depends_on:
      gotrue:
        condition: service_started
      postgrest:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:8000"

  # ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  # ─────────────────────────────────────────────────────────────────────
  # MinIO — S3-compat object storage
  # Console admin: http://localhost:9001 (MINIO_ROOT_USER/PASSWORD)
  # ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: taskflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9001:9001"   # Console admin
    expose:
      - "9000"        # S3 API (interno)

  # ─────────────────────────────────────────────────────────────────────
  # GlitchTip — Error tracking (Sentry-compat, open source)
  # Dashboard: http://localhost:8800
  # ─────────────────────────────────────────────────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: taskflow-glitchtip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-changeme-glitchtip-secret}
      PORT: 8800
      REDIS_URL: redis://redis:6379/1
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8800}
      DEFAULT_FROM_EMAIL: ${SMTP_FROM:-noreply@taskflow.local}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      ENABLE_ORGANIZATION_CREATION: "false"
      CELERY_WORKER_AUTOSCALE: "1,3"
    ports:
      - "8800:8800"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: taskflow-glitchtip-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-changeme-glitchtip-secret}
      REDIS_URL: redis://redis:6379/1
    command: ./bin/run-celery-with-beat.sh

  # ─────────────────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_REALTIME_DRIVER: ${REALTIME_DRIVER:-pg-notify-sse}
        NEXT_PUBLIC_VCS_TOKEN_MODE: ${VCS_TOKEN_MODE:-pat}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-standard}
        NEXT_PUBLIC_GITHUB_OAUTH: ${NEXT_PUBLIC_GITHUB_OAUTH:-false}
        NEXT_PUBLIC_OBS_DRIVER: ${OBS_DRIVER:-glitchtip}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    container_name: taskflow-app
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      nginx:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SUPABASE_INTERNAL_URL: http://nginx:8000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: taskflow

      # Storage — S3 via MinIO
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3-compat}
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-minioadmin}
      STORAGE_S3_BUCKET_PREFIX: ${STORAGE_S3_BUCKET_PREFIX:-taskflow-}
      # Endpoint publico pra URLs de download (browser acessa MinIO direto)
      STORAGE_S3_PUBLIC_ENDPOINT: ${STORAGE_S3_PUBLIC_ENDPOINT:-http://localhost:9000}

      # Drivers
      AUTH_MODE: ${AUTH_MODE:-standard}
      REALTIME_DRIVER: ${REALTIME_DRIVER:-pg-notify-sse}
      NEXT_PUBLIC_REALTIME_DRIVER: ${REALTIME_DRIVER:-pg-notify-sse}
      LLM_DRIVER: ${LLM_DRIVER:-disabled}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      VOICE_DRIVER: ${VOICE_DRIVER:-disabled}
      VOICE_WORKER_URL: ${VOICE_WORKER_URL:-}
      VOICE_WORKER_API_KEY: ${VOICE_WORKER_API_KEY:-}
      VOICE_WEBHOOK_SECRET: ${VOICE_WEBHOOK_SECRET:-}
      VCS_DRIVER: ${VCS_DRIVER:-github}
      VCS_API_URL: ${VCS_API_URL:-}
      VCS_TOKEN_MODE: ${VCS_TOKEN_MODE:-pat}
      NEXT_PUBLIC_VCS_TOKEN_MODE: ${VCS_TOKEN_MODE:-pat}
      VCS_INSTANCE_PAT: ${VCS_INSTANCE_PAT:-}
      OBS_DRIVER: ${OBS_DRIVER:-glitchtip}
      NEXT_PUBLIC_OBS_DRIVER: ${OBS_DRIVER:-glitchtip}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3000:3000"
    volumes:
      - storage-data:/app/storage

  # ─────────────────────────────────────────────────────────────────────
  # Voice Worker (OPCIONAL — requer GPU NVIDIA no host)
  # Descomente e configure VOICE_WORKER_URL no .env.local
  # Build: docker compose -f docker-compose.full.yml build voice-worker
  # ─────────────────────────────────────────────────────────────────────
  # voice-worker:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.voice-worker
  #   container_name: taskflow-voice-worker
  #   restart: unless-stopped
  #   environment:
  #     API_KEY: ${VOICE_WORKER_API_KEY:-changeme}
  #     WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
  #     DEVICE: cuda
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   ports:
  #     - "8080:8080"

volumes:
  postgres-data:
    name: taskflow-postgres-data
  storage-data:
    name: taskflow-storage-data
  redis-data:
    name: taskflow-redis-data
  minio-data:
    name: taskflow-minio-data
