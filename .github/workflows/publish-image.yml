name: Publish Docker Image

on:
  push:
    branches: [main, feat/self-hosted]
    paths:
      - 'src/**'
      - 'docker/Dockerfile.app'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/taskflow-app
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://placeholder.local
            NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon
            NEXT_PUBLIC_SITE_URL=http://localhost:3000
            NEXT_PUBLIC_REALTIME_DRIVER=pg-notify-sse
            NEXT_PUBLIC_VCS_TOKEN_MODE=pat
            NEXT_PUBLIC_AUTH_MODE=closed
            NEXT_PUBLIC_OBS_DRIVER=console
