name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, publish, release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskflow-app:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/taskflow-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://placeholder.local
            NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon
            NEXT_PUBLIC_SITE_URL=http://localhost:3000
            NEXT_PUBLIC_REALTIME_DRIVER=pg-notify-sse
            NEXT_PUBLIC_VCS_TOKEN_MODE=pat
            NEXT_PUBLIC_AUTH_MODE=closed
            NEXT_PUBLIC_OBS_DRIVER=console

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "body=First release 🎉" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD --no-merges)
            # Escape for GitHub Actions
            CHANGES="${CHANGES//'%'/'%25'}"
            CHANGES="${CHANGES//$'\n'/'%0A'}"
            CHANGES="${CHANGES//$'\r'/'%0D'}"
            echo "body=$CHANGES" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Taskflow v${{ steps.version.outputs.version }}
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/taskflow-app:${{ steps.version.outputs.version }}
            ```

            ## Changelog

            ${{ steps.changelog.outputs.body }}

            ## Setup

            See [quickstart-solo.md](docs/self-hosting/quickstart-solo.md) or [quickstart-team.md](docs/self-hosting/quickstart-team.md).
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
